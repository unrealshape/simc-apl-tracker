name: Nightly APL Sync

on:
  schedule:
    - cron: "0 3 * * *"  # Jede Nacht um 03:00 UTC
  workflow_dispatch:       # Manuell auslösbar

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for new SimC commits
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/check_simc_commit.py

      - name: Sync APL files
        if: steps.check.outputs.new_commits == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/sync_apl.py

      - name: Generate changelog
        if: steps.check.outputs.new_commits == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/generate_changelog.py

      - name: Generate docs
        if: steps.check.outputs.new_commits == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/generate_docs.py

      - name: Commit and push changes
        id: commit
        if: steps.check.outputs.new_commits == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            CHANGED_CLASSES=$(git diff --cached --name-only | grep -oP 'apl/default/\K[^/]+' | sort -u | tr '\n' ', ' | sed 's/,$//')
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "sync: APL update ${DATE} [${CHANGED_CLASSES}]

          SimC commit: ${{ steps.check.outputs.latest_sha }}
          APL-relevant commits: ${{ steps.check.outputs.apl_commits }}"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_classes=${CHANGED_CLASSES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure apl-update label exists
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh label create "apl-update" --color "1d76db" --description "Automated APL sync update" 2>/dev/null || true

      - name: Create GitHub Issue on changes
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          CLASSES="${{ steps.check.outputs.changed_classes }}"
          APL_COUNT="${{ steps.check.outputs.apl_commits }}"
          SHA="${{ steps.check.outputs.latest_sha }}"
          SHA_SHORT="${SHA:0:12}"

          BODY="## Nightly APL Sync – ${DATE}

          **SimC Commit:** [\`${SHA_SHORT}\`](https://github.com/simulationcraft/simc/commit/${SHA})
          **APL-relevant Commits:** ${APL_COUNT}
          **Changed Classes:** ${CLASSES}

          ### What changed
          See [changelog/${DATE}.md](changelog/${DATE}.md) for full diff details.

          ---
          *Auto-generated by Nightly APL Sync*"

          gh issue create \
            --title "APL Update ${DATE} – ${CLASSES}" \
            --label "apl-update" \
            --body "${BODY}"

      - name: Write job summary
        if: always()
        run: |
          if [ "${{ steps.commit.outputs.has_changes }}" == "true" ]; then
            echo "## Nightly APL Sync – Changes detected" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Classes:** ${{ steps.check.outputs.changed_classes }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Commits:** ${{ steps.check.outputs.apl_commits }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "A GitHub Issue has been created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Nightly APL Sync – No changes" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "SimC has no new APL-relevant commits since last sync." >> "$GITHUB_STEP_SUMMARY"
          fi
